<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - Our Story</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .page-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 80px 0 40px;
            margin-top: 70px;
            text-align: center;
        }
        .page-header h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }
        .full-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            padding: 4rem 0;
        }
        .gallery-card {
            aspect-ratio: 1;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            font-size: 3.5rem;
        }
        .gallery-card:hover {
            transform: scale(1.08);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .back-link {
            display: inline-block;
            margin: 2rem 0;
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .back-link:hover {
            color: #764ba2;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.htm" class="logo">📖 Our Story</a>
            <ul class="nav-menu">
                <li><a href="index.htm#home" class="nav-link">Home</a></li>
                <li><a href="index.htm#about" class="nav-link">About</a></li>
                <li><a href="index.htm#gallery" class="nav-link">Gallery</a></li>
                <li><a href="index.htm#journal" class="nav-link">Journal</a></li>
            </ul>
        </div>
    </nav>

    <div class="page-header">
        <div class="container">
            <h1>📸 Photo Gallery</h1>
            <p>Visual memories from our journey</p>
        </div>
    </div>

    <section class="container">
        <a href="index.htm" class="back-link">← Back to Home</a>
        
        <div class="full-gallery">
            <div class="gallery-card" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">📍</div>
            <div class="gallery-card" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">🌅</div>
            <div class="gallery-card" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);">😊</div>
            <div class="gallery-card" style="background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);">🎉</div>
            <div class="gallery-card" style="background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);">💑</div>
            <div class="gallery-card" style="background: linear-gradient(135deg, #30cfd0 0%, #330867 100%);">🌃</div>
            <div class="gallery-card" style="background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);">🚀</div>
            <div class="gallery-card" style="background: linear-gradient(135deg, #ff9a56 0%, #ff6a88 100%);">🎭</div>
            <div class="gallery-card" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">✨</div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Rachael & Nate. All memories preserved. Built with ❤️</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
